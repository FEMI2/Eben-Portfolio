services:
  - type: web
    name: portfolio-django
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn my_Portfolio.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: my_Portfolio.production_settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11"
